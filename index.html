<!DOCTYPE html>
<html>
<head>
  <title>Infrastructure Terminal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { margin:0; font-family: monospace; background:#000; color:#0f0; }
    h1 { text-align:center; }
    .grid {
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
      padding:10px;
    }
    .panel {
      border:1px solid #0f0;
      padding:10px;
      height:220px;
      overflow:auto;
    }
    .title { font-weight:bold; margin-bottom:5px; }
    .meta { font-size:10px; opacity:0.7; }
  </style>
</head>
<body>

<h1>INFRASTRUCTURE TERMINAL</h1>

<div class="grid">
  <div class="panel" id="energy"></div>
  <div class="panel" id="outages"></div>
  <div class="panel" id="aqi"></div>
  <div class="panel" id="disasters"></div>
  <div class="panel" id="flights"></div>
  <div class="panel" id="fires"></div>
</div>

<script>
function now() {
  return new Date().toLocaleTimeString();
}

// ENERGY (proxy using US demand estimate via EIA open endpoint fallback)
document.getElementById("energy").innerHTML =
  "<div class='title'>ENERGY (Proxy)</div>" +
  "Grid visibility limited in browser<br>" +
  "Use as placeholder for stress layer<br>" +
  "<div class='meta'>Updated: "+now()+"</div>";

// OUTAGES (proxy explanation)
document.getElementById("outages").innerHTML =
  "<div class='title'>OUTAGES</div>" +
  "Public outage APIs restricted in browser<br>" +
  "Future: backend integration<br>" +
  "<div class='meta'>Updated: "+now()+"</div>";

// AIR QUALITY (OpenAQ)
fetch("https://api.openaq.org/v2/latest?limit=5")
.then(r=>r.json())
.then(d=>{
  let html = "<div class='title'>AIR QUALITY</div>";
  d.results.forEach(c=>{
    let v = c.measurements[0].value;
    html += `${c.city}: AQI ~ ${Math.round(v)}<br>`;
  });
  html += "<div class='meta'>Updated: "+now()+"</div>";
  document.getElementById("aqi").innerHTML = html;
});

// DISASTERS (Earthquakes)
fetch("https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_hour.geojson")
.then(r=>r.json())
.then(d=>{
  let html = "<div class='title'>EARTHQUAKES</div>";
  d.features.slice(0,8).forEach(eq=>{
    html += `${eq.properties.place} M${eq.properties.mag}<br>`;
  });
  html += "<div class='meta'>Updated: "+now()+"</div>";
  document.getElementById("disasters").innerHTML = html;
});

// FLIGHTS
fetch("https://opensky-network.org/api/states/all")
.then(r=>r.json())
.then(d=>{
  let html = "<div class='title'>FLIGHTS</div>";
  d.states.slice(0,8).forEach(f=>{
    html += `${f[1] || "N/A"} Alt:${Math.round(f[7]||0)}<br>`;
  });
  html += "<div class='meta'>Updated: "+now()+"</div>";
  document.getElementById("flights").innerHTML = html;
});

// FIRES (NASA FIRMS public feed)
fetch("https://firms.modaps.eosdis.nasa.gov/data/active_fire/c6.1/csv/USA_contiguous_and_Hawaii_24h.csv")
.then(r=>r.text())
.then(t=>{
  let rows = t.split("\n").slice(1,8);
  let html = "<div class='title'>FIRES</div>";
  rows.forEach(r=>{
    let c = r.split(",");
    if(c.length>3) html += `Lat:${c[0]} Lon:${c[1]}<br>`;
  });
  html += "<div class='meta'>Updated: "+now()+"</div>";
  document.getElementById("fires").innerHTML = html;
});
</script>

</body>
</html>
